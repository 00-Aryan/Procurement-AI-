name: AegisProcure CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify uv installation
        run: uv --version

      - name: Compile Python sources
        run: python3 -m compileall main.py core/ infra/ scripts/

      - name: Run Python tests when present
        run: |
          if find . -path './.venv' -prune -o -path './web/node_modules' -prune -o -name 'test_*.py' -print -quit | grep -q .; then
            python3 -m unittest discover -p 'test_*.py'
          else
            echo "No Python unittest files discovered."
          fi

  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
