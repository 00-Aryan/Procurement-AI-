version: '3.8'

services:
  pm-db:
    image: postgres:16-alpine
    container_name: procuremind-db-prod
    environment:
      POSTGRES_DB: procuremind_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2026
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d procuremind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pm-backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: procuremind-backend-prod
    command: uv run python main.py
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_secure_2026@pm-db:5432/procuremind_db
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      pm-db:
        condition: service_healthy
    networks:
      - pm-network


  pm-frontend:
    build:
      context: .
      dockerfile: web/frontend.Dockerfile
    container_name: procuremind-frontend-prod
    environment:
      NEXT_PUBLIC_API_URL: http://pm-backend:8000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - pm-backend
    networks:
      - pm-network

volumes:
  postgres_prod_data:

networks:
  pm-network:
    driver: bridge
