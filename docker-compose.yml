services:
  postgres:
    image: postgres:16-alpine
    container_name: procuremind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: procuremind_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d procuremind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
