services:
  # 1. Managed PostgreSQL database service container running persistent volumes
  - type: database
    name: pm-db
    databaseName: procuremind_db
    user: postgres
    plan: free

  # 2. Web service instance tracking backend.Dockerfile
  - type: web
    name: pm-backend
    env: docker
    dockerfilePath: backend.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/procurement/anomalies
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pm-db
          property: connectionString
      - key: ENV_MODE
        value: production
      - key: PORT
        value: "8000"

  # 3. Web service instance tracking web/frontend.Dockerfile
  - type: web
    name: pm-frontend
    env: docker
    dockerfilePath: web/frontend.Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: pm-backend
          property: host
      - key: PORT
        value: "3001"
